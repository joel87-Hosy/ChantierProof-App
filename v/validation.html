<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validation | ChantierProof</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-950">
    <main class="mx-auto w-full max-w-xl px-4 py-5">
      <header class="mb-5">
        <div class="brand-lockup">
          <span class="brand-mark">CP</span>
          <p class="text-sm font-semibold uppercase tracking-wide text-blue-700">Validation intervention</p>
        </div>
        <h1 id="client-name" class="mt-2 text-3xl font-bold">Chargement...</h1>
        <p id="intervention-title" class="mt-2 text-slate-600"></p>
      </header>

      <form id="validation-form" class="space-y-5">
        <section class="panel">
          <h2 class="text-lg font-semibold">Photos terrain</h2>
          <div class="mt-4 grid gap-4 sm-grid-cols-2">
            <div class="upload-box">
              <i data-lucide="camera" class="upload-icon"></i>
              <span class="font-semibold">Photo avant</span>
              <span id="photo-before-name" class="mt-1 text-sm text-slate-500">Aucune image selectionnee</span>
              <div class="mt-4 grid gap-2">
                <label class="btn btn-secondary btn-sm">
                  <i data-lucide="camera" class="icon"></i>
                  Prendre une photo
                  <input id="photo-before-camera" class="sr-only" type="file" accept="image/*" capture="environment">
                </label>
                <label class="btn btn-secondary btn-sm">
                  <i data-lucide="image-plus" class="icon"></i>
                  Importer une image
                  <input id="photo-before-import" class="sr-only" type="file" accept="image/*">
                </label>
              </div>
            </div>
            <div class="upload-box">
              <i data-lucide="camera" class="upload-icon"></i>
              <span class="font-semibold">Photo apres</span>
              <span id="photo-after-name" class="mt-1 text-sm text-slate-500">Aucune image selectionnee</span>
              <div class="mt-4 grid gap-2">
                <label class="btn btn-secondary btn-sm">
                  <i data-lucide="camera" class="icon"></i>
                  Prendre une photo
                  <input id="photo-after-camera" class="sr-only" type="file" accept="image/*" capture="environment">
                </label>
                <label class="btn btn-secondary btn-sm">
                  <i data-lucide="image-plus" class="icon"></i>
                  Importer une image
                  <input id="photo-after-import" class="sr-only" type="file" accept="image/*">
                </label>
              </div>
            </div>
          </div>
        </section>

        <section class="panel space-y-4">
          <label class="block">
            <span class="label">Technicien ou equipe intervenante</span>
            <input id="technician-name" class="input mt-2" type="text" autocomplete="organization" required>
          </label>
          <label class="block">
            <span class="label">Position GPS sur site</span>
            <div class="mt-2 flex flex-col gap-2 md-flex-row">
              <input id="field-gps-position" class="input min-w-0 flex-1" type="text" placeholder="Ex: 5.3600, -4.0083" required>
              <button id="capture-field-gps" class="btn btn-secondary" type="button">
                <i data-lucide="map-pin" class="icon"></i>
                Capturer ma position
              </button>
            </div>
          </label>
          <label class="block">
            <span class="label">Commentaire d'intervention</span>
            <textarea id="technician-notes" class="input textarea mt-2" rows="5" placeholder="Travaux realises, contraintes, reserves, pieces remplacees..."></textarea>
          </label>
        </section>

        <section class="panel">
          <div class="flex items-center justify-between gap-3">
            <h2 class="text-lg font-semibold">Signature</h2>
            <button id="clear-signature" class="btn btn-secondary btn-sm" type="button">
              <i data-lucide="eraser" class="icon"></i>
              Effacer
            </button>
          </div>
          <canvas id="signature-canvas" class="mt-4 signature-canvas" width="640" height="260"></canvas>
        </section>

        <section class="panel space-y-4">
          <label class="block">
            <span class="label">Nom du signataire</span>
            <input id="signer-name" class="input mt-2" type="text" autocomplete="name" required>
          </label>
          <label class="flex items-start gap-3 text-sm leading-6 text-slate-700">
            <input id="legal-consent" class="checkbox mt-1" type="checkbox" required>
            <span>
              Je confirme que les travaux presentes correspondent a l'intervention realisee et j'autorise l'utilisation de cette validation pour la facturation, conformement aux
              <a class="text-blue-700 font-semibold" href="../conditions-utilisation.html" target="_blank" rel="noopener">conditions d'utilisation</a>
              et a la
              <a class="text-blue-700 font-semibold" href="../politique-confidentialite.html" target="_blank" rel="noopener">politique de confidentialite</a>.
            </span>
          </label>
        </section>

        <p id="form-error" class="hidden rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700"></p>
        <button id="seal-btn" class="btn btn-primary w-full" type="submit">
          <i data-lucide="lock-keyhole" class="icon"></i>
          Valider et Sceller l'intervention
        </button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="../lib/config.js"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/signature.js"></script>
    <script src="../assets/js/validation.js"></script>
  </body>
</html>
