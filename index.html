<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChantierProof</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body class="min-h-screen text-slate-950">
    <main class="home-shell mx-auto flex min-h-screen w-full max-w-6xl flex-col justify-center px-6 py-12">
      <section class="home-centered text-center">
        <div class="brand-lockup justify-center">
          <span class="brand-mark">CP</span>
          <span class="text-sm font-semibold uppercase tracking-wide text-blue-700">ChantierProof</span>
        </div>
        <h1 class="mt-5 mx-auto max-w-2xl text-4xl font-bold leading-tight md-text-6xl">
          Preuve terrain signee, prete pour la facturation.
        </h1>
        <p class="mt-5 mx-auto max-w-xl text-lg leading-8 text-slate-600">
          Generez un lien, collectez photos avant/apres, commentaire technicien, signature client et statut de validation.
        </p>
        <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
          <a class="btn btn-primary" href="./login.html">
            <i data-lucide="log-in" class="icon"></i>
            Se connecter
          </a>
        </div>
        <p class="mt-4 text-sm text-slate-500">
          Cree un lien depuis le dashboard, puis partage-le au technicien ou au client sur mobile.
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>window.lucide?.createIcons();</script>
  </body>
</html>
